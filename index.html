<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Series MLB — Tracker</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Inter:wght@400;500;600&display=swap');
  :root {
    --bg:#0f1117;--surface:#181c24;--border:#2a2f3d;--accent:#4ade80;
    --text:#e8eaf0;--muted:#6b7280;
    --over-bg:#2d1515;--over-fg:#f87171;
    --under-bg:#0f2318;--under-fg:#4ade80;
    --live-bg:#2d1a0a;--live-fg:#fb923c;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;font-size:14px;min-height:100vh;padding:0 0 3rem}
  header{border-bottom:1px solid var(--border);padding:1.25rem 1.5rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--bg);z-index:10}
  .logo{font-family:'IBM Plex Mono',monospace;font-size:15px;font-weight:500;color:var(--accent)}
  .logo span{color:var(--text)}
  #last-update{font-size:12px;color:var(--muted);font-family:'IBM Plex Mono',monospace}
  main{padding:1.5rem;max-width:920px;margin:0 auto}
  .toolbar{display:flex;gap:10px;margin-bottom:1.5rem;flex-wrap:wrap}
  .toolbar input{flex:1;min-width:180px;background:var(--surface);border:1px solid var(--border);color:var(--text);padding:8px 12px;border-radius:6px;font-size:13px;font-family:'Inter',sans-serif;outline:none}
  .toolbar input:focus{border-color:var(--accent)}
  .toolbar input::placeholder{color:var(--muted)}
  .toolbar button{background:var(--surface);border:1px solid var(--border);color:var(--text);padding:8px 16px;border-radius:6px;font-size:13px;cursor:pointer;font-family:'Inter',sans-serif;white-space:nowrap;transition:border-color 0.15s}
  .toolbar button:hover{border-color:var(--accent);color:var(--accent)}
  .toolbar button.primary{border-color:var(--accent);color:var(--accent)}
  .series-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;margin-bottom:16px;overflow:hidden}
  .series-head{padding:1rem 1.25rem 0.75rem;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
  .series-teams{font-size:16px;font-weight:600;color:var(--text)}
  .series-meta{font-size:12px;color:var(--muted);margin-top:3px;font-family:'IBM Plex Mono',monospace}
  .series-pill{font-size:11px;padding:4px 10px;border-radius:20px;white-space:nowrap;font-family:'IBM Plex Mono',monospace;font-weight:500;flex-shrink:0}
  .pill-active{background:#0f2318;color:var(--accent);border:1px solid #1a3d26}
  .pill-done{background:#1a1e29;color:var(--muted);border:1px solid var(--border)}
  .game-row{display:grid;grid-template-columns:70px 1fr 200px 90px;align-items:center;padding:0.75rem 1.25rem;gap:12px;border-bottom:1px solid var(--border)}
  .game-row:last-child{border-bottom:none}
  .game-num{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.05em;line-height:1.6}
  .game-score{display:flex;flex-direction:column;gap:3px}
  .score-line{font-size:13px;display:flex;align-items:center;gap:8px}
  .score-name{color:var(--muted);min-width:150px;font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .score-val{font-family:'IBM Plex Mono',monospace;font-size:16px;font-weight:500;color:var(--text);min-width:24px}
  .score-val.win{color:var(--accent)}
  .ou-block{display:flex;flex-direction:column;gap:5px}
  .ou-result{font-size:13px;font-family:'IBM Plex Mono',monospace;font-weight:500;padding:4px 10px;border-radius:5px;text-align:center}
  .ou-over{background:var(--over-bg);color:var(--over-fg)}
  .ou-under{background:var(--under-bg);color:var(--under-fg)}
  .ou-push{background:#1e2130;color:var(--muted)}
  .ou-detail{font-size:11px;color:var(--muted);font-family:'IBM Plex Mono',monospace;text-align:center}
  .ou-saved{font-size:10px;color:#4ade8088;font-family:'IBM Plex Mono',monospace;text-align:center}
  .lock-btn{font-size:11px;padding:4px 10px;border-radius:5px;background:#1e2130;border:1px solid var(--border);color:var(--accent);cursor:pointer;font-family:'IBM Plex Mono',monospace;white-space:nowrap;transition:border-color 0.15s}
  .lock-btn:hover{border-color:var(--accent)}
  .no-line{font-size:11px;color:var(--muted);font-family:'IBM Plex Mono',monospace}
  .status-tag{font-size:11px;padding:3px 9px;border-radius:4px;font-family:'IBM Plex Mono',monospace;text-align:center}
  .st-final{background:#1a1e29;color:var(--muted)}
  .st-live{background:var(--live-bg);color:var(--live-fg);animation:pulse 1.5s infinite}
  .st-sched{background:#1e2130;color:var(--muted)}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.6}}
  .totals-bar{display:flex;border-top:1px solid var(--border)}
  .total-box{flex:1;padding:0.6rem 1rem;text-align:center;border-right:1px solid var(--border)}
  .total-box:last-child{border-right:none}
  .total-val{font-size:18px;font-weight:600;font-family:'IBM Plex Mono',monospace;color:var(--text)}
  .total-lbl{font-size:11px;color:var(--muted);margin-top:2px}
  .state-msg{text-align:center;padding:3rem 1rem;color:var(--muted);font-size:14px}
  .error-msg{color:var(--over-fg)}
  .info-bar{background:#0f2318;border:1px solid #1a3d26;border-radius:8px;padding:0.75rem 1rem;margin-bottom:1.25rem;font-size:12px;color:#4ade80cc;font-family:'IBM Plex Mono',monospace;line-height:1.6}
</style>
</head>
<body>
<header>
  <div class="logo">MLB<span>.series</span></div>
  <div id="last-update">cargando...</div>
</header>
<main>
  <div class="info-bar">
    → Cuando se confirmen alineaciones, presiona <strong>"Fijar línea"</strong> en cada juego para guardarla.<br>
    → Al terminar el juego, la página calcula automáticamente si fue Over o Under.
  </div>
  <div class="toolbar">
    <input type="text" id="search" placeholder="Buscar equipo (ej. Dodgers, Yankees...)" />
    <button class="primary" onclick="recargar()">↺ Actualizar</button>
    <button onclick="limpiar()">Ver todo</button>
  </div>
  <div id="container">
    <div class="state-msg">Cargando series de MLB...</div>
  </div>
</main>

<script>
const MLB_BASE = 'https://statsapi.mlb.com/api/v1';
const ODDS_KEY = 'a6653ead8c0ca58c84f0499b837aba40';
const ODDS_BASE = 'https://api.the-odds-api.com/v4';
const STORE_KEY = 'mlb_locked_lines_v2';

// Load/save locked lines from localStorage
function loadLockedLines() {
  try { return JSON.parse(localStorage.getItem(STORE_KEY) || '{}'); } catch(e) { return {}; }
}
function saveLockedLines(data) {
  try { localStorage.setItem(STORE_KEY, JSON.stringify(data)); } catch(e) {}
}

// Fetch MLB games (last 5 days + next 2)
async function fetchMLBGames() {
  const hoy = new Date();
  const fmt = d => d.toISOString().split('T')[0];
  const desde = new Date(hoy); desde.setDate(hoy.getDate() - 5);
  const hasta = new Date(hoy); hasta.setDate(hoy.getDate() + 2);
  const url = `${MLB_BASE}/schedule?sportId=1&startDate=${fmt(desde)}&endDate=${fmt(hasta)}&hydrate=linescore&gameType=R,F,D,L,W,C`;
  const res = await fetch(url);
  const data = await res.json();
  const games = [];
  for (const day of (data.dates || [])) {
    for (const g of (day.games || [])) {
      const isLive  = g.status.abstractGameState === 'Live';
      const isFinal = g.status.abstractGameState === 'Final';
      const homeR = (isFinal || isLive) ? (g.linescore?.teams?.home?.runs ?? g.teams.home.score ?? null) : null;
      const awayR = (isFinal || isLive) ? (g.linescore?.teams?.away?.runs ?? g.teams.away.score ?? null) : null;
      const total = (homeR !== null && awayR !== null) ? homeR + awayR : null;
      const fechaLabel = new Date(g.gameDate).toLocaleDateString('es-MX',{month:'short',day:'numeric',timeZone:'America/Mexico_City'});
      games.push({
        gamePk: String(g.gamePk),
        gameDate: g.gameDate,
        fecha: fechaLabel,
        home: g.teams.home.team.name,
        away: g.teams.away.team.name,
        homeR, awayR, total,
        isLive, isFinal,
        isScheduled: !isLive && !isFinal,
        liveOuLine: null
      });
    }
  }
  return games;
}

// Fetch current O/U lines from The Odds API
async function fetchOdds() {
  try {
    const url = `${ODDS_BASE}/sports/baseball_mlb/odds/?apiKey=${ODDS_KEY}&regions=us&markets=totals&oddsFormat=american`;
    const res = await fetch(url);
    if (!res.ok) return [];
    return await res.json();
  } catch(e) { return []; }
}

function normalize(name) {
  return name.toLowerCase().replace(/\blos angeles\b/g,'la').replace(/\bst\.\s*/g,'st ').replace(/[^a-z0-9 ]/g,'').trim();
}

function teamsMatch(mlbHome, mlbAway, oddsHome, oddsAway) {
  const mh=normalize(mlbHome), ma=normalize(mlbAway), oh=normalize(oddsHome), oa=normalize(oddsAway);
  const wm=(a,b)=>a.split(' ').some(w=>w.length>3&&b.split(' ').includes(w));
  return (wm(mh,oh)&&wm(ma,oa))||(wm(mh,oa)&&wm(ma,oh));
}

async function buildSeries() {
  const [mlbGames, oddsData] = await Promise.all([fetchMLBGames(), fetchOdds()]);

  // Attach live lines from Odds API
  for (const g of mlbGames) {
    for (const odd of oddsData) {
      if (teamsMatch(g.home, g.away, odd.home_team, odd.away_team)) {
        const market = odd.bookmakers?.[0]?.markets?.find(m => m.key === 'totals');
        const over = market?.outcomes?.find(o => o.name === 'Over');
        if (over) { g.liveOuLine = over.point; break; }
      }
    }
  }

  // Group into series
  const map = {};
  for (const g of mlbGames) {
    const key = [g.home, g.away].sort().join('|||');
    if (!map[key]) map[key] = { home: g.home, away: g.away, games: [] };
    map[key].games.push(g);
  }

  return Object.values(map)
    .filter(s => s.games.length >= 2)
    .map(s => {
      s.games.sort((a,b) => new Date(a.gameDate) - new Date(b.gameDate));
      s.games = s.games.slice(0, 4);
      const hw = s.games.filter(g => g.isFinal && g.homeR > g.awayR).length;
      const aw = s.games.filter(g => g.isFinal && g.awayR > g.homeR).length;
      s.serieRecord = `${s.away} ${aw}–${hw} ${s.home}`;
      s.hasLive = s.games.some(g => g.isLive);
      s.hasUpcoming = s.games.some(g => g.isScheduled);
      return s;
    })
    .sort((a,b)=>{
      if(a.hasLive&&!b.hasLive)return -1; if(!a.hasLive&&b.hasLive)return 1;
      if(a.hasUpcoming&&!b.hasUpcoming)return -1; if(!a.hasUpcoming&&b.hasUpcoming)return 1;
      return 0;
    });
}

function lockLine(gamePk, line, savedAt) {
  const locked = loadLockedLines();
  locked[gamePk] = { line: parseFloat(line), savedAt: savedAt || new Date().toLocaleTimeString('es-MX',{hour:'2-digit',minute:'2-digit'}) };
  saveLockedLines(locked);
  recargar();
}

function renderSeries(series, filtro) {
  const container = document.getElementById('container');
  const locked = loadLockedLines();
  let lista = series;
  if (filtro) {
    const q = filtro.toLowerCase();
    lista = series.filter(s => s.home.toLowerCase().includes(q) || s.away.toLowerCase().includes(q));
  }
  if (lista.length === 0) {
    container.innerHTML = filtro
      ? `<div class="state-msg">No hay series con "<strong>${filtro}</strong>".</div>`
      : `<div class="state-msg">No se encontraron series activas de MLB.</div>`;
    return;
  }

  container.innerHTML = lista.map(s => {
    let totalC=0, unders=0, overs=0;

    const filas = s.games.map((g, i) => {
      const homeWin = g.isFinal && g.homeR > g.awayR;
      const awayWin = g.isFinal && g.awayR > g.homeR;
      const homeScore = g.homeR !== null ? g.homeR : '–';
      const awayScore = g.awayR !== null ? g.awayR : '–';
      if (g.total) totalC += g.total;

      // Determine which line to use: locked > live
      const lockedData = locked[g.gamePk];
      const usedLine = lockedData ? lockedData.line : null;
      const liveLineFmt = g.liveOuLine ? g.liveOuLine : null;

      // Calculate result if game is final and we have a locked line
      let ouResult = null;
      if (g.isFinal && usedLine !== null && g.total !== null) {
        if (g.total > usedLine) { ouResult = 'over'; overs++; }
        else if (g.total < usedLine) { ouResult = 'under'; unders++; }
        else ouResult = 'push';
      }

      // Build O/U display
      let ouHtml = '';
      if (g.isFinal && usedLine !== null) {
        // Show result
        const cls = ouResult === 'over' ? 'ou-over' : ouResult === 'under' ? 'ou-under' : 'ou-push';
        const label = ouResult === 'over' ? `▲ OVER ${usedLine}` : ouResult === 'under' ? `▼ UNDER ${usedLine}` : `PUSH ${usedLine}`;
        ouHtml = `<div class="ou-block">
          <div class="ou-result ${cls}">${label}</div>
          <div class="ou-detail">${g.total} carreras totales</div>
          <div class="ou-saved">Línea fijada · ${lockedData.savedAt}</div>
        </div>`;
      } else if (g.isFinal && usedLine === null) {
        // Final but no locked line
        ouHtml = `<div class="ou-block">
          <div class="ou-result ou-push">Total: ${g.total} c.</div>
          <div class="ou-detail">Sin línea fijada</div>
        </div>`;
      } else if (!g.isFinal && lockedData) {
        // Line locked, game not done yet
        ouHtml = `<div class="ou-block">
          <div class="ou-result ou-push">Línea: ${lockedData.line}</div>
          <div class="ou-detail">${g.isLive && g.total !== null ? `En juego: ${g.total} c.` : 'Esperando resultado'}</div>
          <div class="ou-saved">Fijada · ${lockedData.savedAt}</div>
        </div>`;
      } else if (liveLineFmt) {
        // Live line available, not locked yet
        ouHtml = `<div class="ou-block">
          <div class="ou-detail" style="margin-bottom:3px">Línea actual: <strong style="color:var(--text)">${liveLineFmt}</strong></div>
          <button class="lock-btn" onclick="lockLine('${g.gamePk}', ${liveLineFmt})">⚑ Fijar línea</button>
        </div>`;
      } else {
        ouHtml = `<div class="ou-block"><div class="no-line">Sin línea disponible</div></div>`;
      }

      let stHtml = g.isLive
        ? `<span class="status-tag st-live">● VIVO</span>`
        : g.isFinal
          ? `<span class="status-tag st-final">Final</span>`
          : `<span class="status-tag st-sched">${g.fecha}</span>`;

      return `<div class="game-row">
        <div class="game-num">Juego ${i+1}<br><span style="font-size:10px;opacity:0.5">${g.fecha}</span></div>
        <div class="game-score">
          <div class="score-line"><span class="score-name">${g.away}</span><span class="score-val ${awayWin?'win':''}">${awayScore}</span></div>
          <div class="score-line"><span class="score-name">${g.home}</span><span class="score-val ${homeWin?'win':''}">${homeScore}</span></div>
        </div>
        <div>${ouHtml}</div>
        <div>${stHtml}</div>
      </div>`;
    }).join('');

    const pillClass = (s.hasLive || s.hasUpcoming) ? 'pill-active' : 'pill-done';
    const pillText  = s.hasLive ? 'En vivo' : s.hasUpcoming ? 'Serie activa' : 'Finalizada';

    return `<div class="series-card">
      <div class="series-head">
        <div>
          <div class="series-teams">${s.away} <span style="color:var(--muted);font-weight:400">@</span> ${s.home}</div>
          <div class="series-meta">${s.serieRecord}</div>
        </div>
        <span class="series-pill ${pillClass}">${pillText}</span>
      </div>
      <div>${filas}</div>
      <div class="totals-bar">
        <div class="total-box"><div class="total-val">${totalC}</div><div class="total-lbl">Carreras totales</div></div>
        <div class="total-box"><div class="total-val" style="color:var(--under-fg)">${unders}</div><div class="total-lbl">Under</div></div>
        <div class="total-box"><div class="total-val" style="color:var(--over-fg)">${overs}</div><div class="total-lbl">Over</div></div>
        <div class="total-box"><div class="total-val">${s.games.length}</div><div class="total-lbl">Partidos</div></div>
      </div>
    </div>`;
  }).join('');
}

let allSeries = [];

async function recargar() {
  if (allSeries.length === 0)
    document.getElementById('container').innerHTML = '<div class="state-msg">Cargando series de MLB...</div>';
  try {
    allSeries = await buildSeries();
    const filtro = document.getElementById('search').value.trim();
    renderSeries(allSeries, filtro);
    const now = new Date();
    document.getElementById('last-update').textContent =
      'Actualizado: ' + now.toLocaleTimeString('es-MX',{hour:'2-digit',minute:'2-digit'}) + ' CST';
  } catch(e) {
    document.getElementById('container').innerHTML =
      `<div class="state-msg error-msg">Error al cargar datos.<br><small>${e.message}</small></div>`;
  }
}

function limpiar() {
  document.getElementById('search').value = '';
  renderSeries(allSeries, '');
}

document.getElementById('search').addEventListener('input', e => {
  renderSeries(allSeries, e.target.value.trim());
});

recargar();
// Auto-refresh every 5 minutes
setInterval(recargar, 5 * 60 * 1000);
</script>
</body>
</html>
